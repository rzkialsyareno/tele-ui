<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telegram Bot UI Builder</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="top-nav">
      <div class="logo">
        <i class="fab fa-telegram"></i>
        <span>Telegram Builder</span>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-save">
          <i class="fas fa-save"></i> Save All
        </button>
      </div>
    </header>

    <div class="main-container">
      <!-- Sidebar Toolbox -->
      <aside class="sidebar left-sidebar">
        <div class="sidebar-header">TOOLBOX</div>
        <p class="sidebar-desc">Drag elements to canvas</p>

        <div class="toolbox-section">
          <div class="draggable-item" draggable="true" data-type="photo">
            <i class="fas fa-image"></i>
            <div class="item-text">
              <span>Photo Media</span>
              <small>Image Banner / Square</small>
            </div>
          </div>

          <div class="draggable-item" draggable="true" data-type="text">
            <i class="fas fa-font"></i>
            <div class="item-text">
              <span>Message Text</span>
              <small>Rich Text Format HTML</small>
            </div>
          </div>
          <!-- Inline Buttons Group -->
          <div class="toolbox-group-label">
            <i class="fas fa-layer-group"></i> Inline Buttons
          </div>
          <div class="toolbox-sub-items">
            <div
              class="draggable-item sub-item"
              draggable="true"
              data-type="button_1"
            >
              <div class="sub-preview"><div class="sp-block full"></div></div>
              <span>100%</span>
            </div>
            <div
              class="draggable-item sub-item"
              draggable="true"
              data-type="button_2"
            >
              <div class="sub-preview">
                <div class="sp-block"></div>
                <div class="sp-block"></div>
              </div>
              <span>50%</span>
            </div>
            <div
              class="draggable-item sub-item"
              draggable="true"
              data-type="button_4"
            >
              <div class="sub-preview">
                <div class="sp-block"></div>
                <div class="sp-block"></div>
                <div class="sp-block"></div>
                <div class="sp-block"></div>
              </div>
              <span>25%</span>
            </div>
          </div>

          <!-- Reply Keyboard Group -->
          <div class="toolbox-group-label">
            <i class="fas fa-keyboard"></i> Reply Keyboard
          </div>
          <div class="toolbox-sub-items">
            <div
              class="draggable-item sub-item"
              draggable="true"
              data-type="reply_1"
            >
              <div class="sub-preview">
                <div class="sp-block-reply full"></div>
              </div>
              <span>100%</span>
            </div>
            <div
              class="draggable-item sub-item"
              draggable="true"
              data-type="reply_2"
            >
              <div class="sub-preview">
                <div class="sp-block-reply"></div>
                <div class="sp-block-reply"></div>
              </div>
              <span>50%</span>
            </div>
            <div
              class="draggable-item sub-item"
              draggable="true"
              data-type="reply_4"
            >
              <div class="sub-preview">
                <div class="sp-block-reply"></div>
                <div class="sp-block-reply"></div>
                <div class="sp-block-reply"></div>
                <div class="sp-block-reply"></div>
              </div>
              <span>25%</span>
            </div>
          </div>
        </div>
        <div style="padding: 20px">
          <button
            class="btn btn-outline"
            style="width: 100%; justify-content: center"
            id="add-card-btn"
          >
            <i class="fas fa-plus"></i> Add New Card
          </button>
        </div>
      </aside>

      <!-- Main Canvas -->
      <main class="canvas-area">
        <div class="canvas-workspace" id="workspace">
          <div class="bg-pattern"></div>

          <div class="card-wrapper" id="card-template-wrapper">
            <div class="card-meta">
              <div class="card-title" contenteditable="true" spellcheck="false">
                Message 1
              </div>
              <div class="card-actions">
                <button class="delete-card-btn" title="Delete Card">
                  <i class="fas fa-times"></i>
                </button>
              </div>
            </div>

            <div class="telegram-card" id="card-template">
              <div class="card-content-area dropzone" id="initial-dropzone">
                <div class="placeholder-msg">Drag elements here...</div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Floating Format Toolbar -->
    <div class="format-toolbar" id="format-toolbar">
      <button data-cmd="bold" title="Bold (Ctrl+B)">
        <i class="fas fa-bold"></i>
      </button>
      <button data-cmd="italic" title="Italic (Ctrl+I)">
        <i class="fas fa-italic"></i>
      </button>
      <button data-cmd="underline" title="Underline (Ctrl+U)">
        <i class="fas fa-underline"></i>
      </button>
      <button data-cmd="strikethrough" title="Strikethrough">
        <i class="fas fa-strikethrough"></i>
      </button>
      <button data-cmd="code" title="Monospace / Code">
        <i class="fas fa-code"></i>
      </button>
      <button data-cmd="quote" title="Quote / Blockquote">
        <i class="fas fa-quote-left"></i>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
